<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="custom.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="app-bg">
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="page-title">
                <i class="bi bi-credit-card me-2"></i>
                Payment
            </h1>
            <p class="text-muted mb-0">Enter your payment details below to pay your parking ticket.</p>
        </div>
        <div class="row justify-content-center">
            <div class="col-12 col-lg-6">
                <div class="card shadow-sm border-0">
                    <div class="card-body p-4">
                        <h5 class="card-title fw-bold mb-3">Enter Payment Details</h5>
                        <form>
                            <div class="mb-3">
                                <label class="form-label fw-semibold"> <i class="bi bi-person me-2"></i>Name on Card</label>
                                <input type="text" class="form-control" placeholder="John Doe">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-semibold"> <i class="bi bi-credit-card me-2"></i>Card Number</label>
                                <input type="text" class="form-control" placeholder="1234 5678 9012 3456">
                            </div>
                            <div class="row g-3">
                                <div class="col-6">
                                    <label class="form-label fw-semibold">Expiration Date</label>
                                    <input type="text" class="form-control" placeholder="MM/YY">
                                </div>
                                <div class="col-6">
                                    <label class="form-label fw-semibold">CVV</label>
                                    <input type="text" class="form-control" placeholder="123">
                                </div>
                            </div>
                            <div class="mt-4">
                                <a href="payment-success.html" class="btn btn-success w-100">
                                    <i class="bi bi-currency-dollar me-2"></i>Pay Now</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
</body>
</html>
