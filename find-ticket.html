<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find Ticket</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="custom.css">    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body class="app-bg">
    <div class="container py-5">
        <div class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="text-center mb-4">
                <h1 class="page-title">Find Ticket</h1>
                <p class="text-muted mb-0">Enter your ticket number to search.</p>  
            </div>
            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <form id="ticketSearchForm">
                            <div class="mb-3">
                                <label for="searchInput" class="form-label fw-semibold">
                                    <i class="bi bi-search me-2"></i>Ticket Number
                                </label>
                                <input type="text" class="form-control" id="searchInput" placeholder="Enter your ticket number">
                                <div class="invalid-feedback">
                                    Please enter a ticket number.
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-search me-2"></i>Search Ticket
                            </button>
                        </form>
                </div>
            </div>
        </div>
        </div>
    </div>
    
    <script>
        const form = document.getElementById('ticketSearchForm');
        const input = document.getElementById('searchInput');

        form.addEventListener('submit', function(event) {
            event.preventDefault();
            const value = input.value.trim();

            if (value === "") {
                input.classList.add("is-invalid");
            } else {
                input.classList.remove("is-invalid");   
                // Simulate search and redirect to ticket details
                window.location.href = 'ticket-details.html';
            }
        });
    </script>
</body>
</html>
